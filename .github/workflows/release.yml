name: Release

on:
  push:
    tags:
      - 'plugin-v*'
      - 'unity-v*'

jobs:
  # Plugin builds require PluginApi.dll from a local Logi Plugin Service install,
  # which cannot be reproduced in CI. We open a draft release here; the maintainer
  # runs `dotnet build -c Release` + `logiplugintool pack` locally and uploads
  # the resulting LogiHapticsUnity_x.y.lplug4 asset.
  plugin:
    if: startsWith(github.ref, 'refs/tags/plugin-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Open draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Logi Plugin ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Manual upload required

            Build + package locally (needs Logi Options+ installed for `PluginApi.dll`):

            ```bash
            cd logi-plugin/src
            dotnet build -c Release
            dotnet tool install --global LogiPluginTool   # once
            logiplugintool pack ../bin/Release
            ```

            Upload the generated `LogiHapticsUnity_*.lplug4` to this release, then publish.

  unity:
    if: startsWith(github.ref, 'refs/tags/unity-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync package.json version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#unity-v}"
          tmp=$(mktemp)
          jq --arg v "$version" '.version = $v' unity-package/package.json > "$tmp"
          mv "$tmp" unity-package/package.json
          cat unity-package/package.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Unity Package ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Unity Package Manager → Add package from git URL:

            ```
            https://github.com/edinylcnn/LogiHapticsForUnity.git?path=/unity-package#${{ github.ref_name }}
            ```
